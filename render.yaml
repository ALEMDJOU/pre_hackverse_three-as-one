services:
  # Le Backend API
  - type: web
    name: sparktime-backend
    env: python
    rootDir: sparktime_backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sparktime-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # À remplir manuellement dans le dashboard Render
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: sparktime-db
    plan: free # Utilise le plan gratuit (90 jours)
