<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparktime - Taches</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
    <div class="scroll-progress" aria-hidden="true"></div>
    <header class="app-header">
        <div class="container">
            <a href="../index.html" class="logo"><img src="../assets/images/logo.png" alt="Logo Sparktime"><span>sparktime</span></a>
            <nav class="desktop-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="tasks.html">Taches</a>
                <a href="planner.html">Planning</a>
                <a href="profile.html">Profil</a>
            </nav>
        </div>
    </header>
    <main class="app-main">
        <div class="container app-grid">
            <section class="panel">
                <h2>Nouvelle tache</h2>
                <form class="auth-form" id="task-form">
                    <div class="form-group"><label for="task-title">Titre</label><input id="task-title" type="text" placeholder="Ex: TP Algorithmique" required></div>
                    <div class="form-group"><label for="task-description">Description</label><input id="task-description" type="text" placeholder="Optionnelle"></div>
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div>
                            <label for="task-due-date">Date d'échéance</label>
                            <input id="task-due-date" type="datetime-local">
                        </div>
                        <div>
                            <label for="task-estimated">Durée estimée (min)</label>
                            <input id="task-estimated" type="number" min="5" value="60">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priorité</label>
                        <select id="task-priority" class="styled-select" required>
                            <option value="urgent">🔴 Urgent</option>
                            <option value="high">🟠 Haute</option>
                            <option value="medium" selected>🟡 Moyenne</option>
                            <option value="low">🟢 Basse</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-glow" type="submit">Ajouter</button>
                </form>
            </section>
            <section class="panel">
                <h2>Liste des taches</h2>
                <ul class="task-list" id="task-list"></ul>
            </section>
        </div>
    </main>
    <script src="../assets/js/env.js"></script>
    <script type="module" src="../assets/js/guard.js"></script>
    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/tasks.js"></script>
    <script type="module" src="../assets/js/ai.js"></script>
</body>
</html>
