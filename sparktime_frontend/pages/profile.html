<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparktime - Profil</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
    <div class="scroll-progress" aria-hidden="true"></div>
    <header class="app-header">
        <div class="container">
            <a href="../index.html" class="logo"><img src="../assets/images/logo.png" alt="Logo Sparktime"><span>sparktime</span></a>
            <nav class="desktop-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="tasks.html">Taches</a>
                <a href="planner.html">Planning</a>
                <a href="profile.html">Profil</a>
            </nav>
        </div>
    </header>
    <main class="app-main">
        <div class="container app-grid">
            <section class="panel animate-in">
                <h2>Mon profil</h2>
                <form class="auth-form" id="profile-form">
                    <div class="form-group">
                        <label for="profile-name">Nom complet</label>
                        <input id="profile-name" type="text" placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label for="profile-email">Email</label>
                        <input id="profile-email" type="email" disabled>
                    </div>
                    <button class="btn btn-primary btn-glow" type="submit">Mettre a jour</button>
                </form>
            </section>
            <section class="panel animate-in">
                <h2>Photo de profil</h2>
                <img id="profile-photo-preview" alt="Photo de profil" style="max-width: 96px; border-radius: 999px; margin-bottom: 12px; display: none;">
                <form class="auth-form" id="profile-photo-form">
                    <div class="form-group">
                        <label for="profile-photo-file">Choisir une image</label>
                        <input id="profile-photo-file" type="file" accept="image/*">
                    </div>
            </section>
        </div>
    </main>
    <script src="../assets/js/env.js"></script>
    <script type="module" src="../assets/js/guard.js"></script>
    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/profile.js"></script>
</body>
</html>
