<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparktime - Profil</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
    <div class="scroll-progress" aria-hidden="true"></div>
    <header class="app-header">
        <div class="container">
            <a href="../index.html" class="logo"><img src="../assets/images/logo.png" alt="Logo Sparktime"><span>sparktime</span></a>
            <nav class="desktop-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="tasks.html">Taches</a>
                <a href="planner.html">Planning</a>
                <a href="profile.html">Profil</a>
            </nav>
        </div>
    </header>
    <main class="app-main">
        <div class="container profile-layout">
            <aside class="profile-sidebar animate-in">
                <div class="panel">
                    <h2>Photo de profil</h2>
                    <img id="profile-photo-preview" class="profile-avatar-large" alt="Photo de profil" style="display: none;">
                    <form class="auth-form" id="profile-photo-form">
                        <div class="form-group">
                            <label for="profile-photo-file" class="btn btn-ghost-dark" style="cursor: pointer; width: 100%; text-align: center;">Changer ma photo</label>
                            <input id="profile-photo-file" type="file" accept="image/*" style="display: none;">
                        </div>
                    </form>
                </div>
            </aside>

            <section class="profile-main animate-in">
                <div class="panel">
                    <h2>Mon profil</h2>
                    <p style="margin-bottom: 20px; opacity: 0.7;">Gérez vos informations personnelles et votre identité sur Sparktime.</p>
                    <form class="auth-form" id="profile-form">
                        <div class="form-group">
                            <label for="profile-name">Nom complet</label>
                            <input id="profile-name" type="text" placeholder="Alex Martin" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-email">Email étudiant (Non modifiable)</label>
                            <input id="profile-email" type="email" disabled style="background: var(--bg-secondary); cursor: not-allowed; opacity: 0.8;">
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-primary btn-glow" type="submit" style="width: 100%;">Enregistrer les modifications</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <script src="../assets/js/env.js"></script>
    <script type="module" src="../assets/js/guard.js"></script>
    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/profile.js"></script>
</body>
</html>
